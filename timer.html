<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카운트다운 타이머</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { display: flex; gap: 5px; align-items: center; margin-bottom: 15px; }
        input { width: 150px; padding: 5px; }
        button { padding: 5px 10px; cursor: pointer; }
        #display { font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>
    <h2>카운트다운 타이머</h2>

    <div class="controls">
        <input id="seconds" type="number" value="15" placeholder="초 입력" />
        <button id="start">시작</button>
        <button id="pause">일시정지</button>
        <button id="resume">재개</button>
        <button id="reset">초기화</button>
    </div>

    <p id="display">대기 중</p>

    <script src="timer.js"></script>
</body>
</html>
